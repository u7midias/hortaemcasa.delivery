<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horta em Casa — Admin Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --g1:#1b4332;--g2:#2d6a4f;--g3:#40916c;--g4:#52b788;
  --gp:#d8f3dc;--gpp:#f0faf3;
  --terra:#c9a14a;--terra-l:#fef3d7;
  --creme:#faf7f0;--escuro:#1a1a2e;
  --cinza:#6b7280;--cinza-l:#e5e7eb;
  --branco:#fff;--danger:#dc2626;
  --r:14px;--sh:0 2px 16px rgba(45,106,79,.10);--sh2:0 8px 32px rgba(45,106,79,.18);
  --azul:#1d4ed8;--azul-l:#dbeafe;
  --amarelo:#92400e;--amarelo-l:#fef9c3;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--creme);color:var(--escuro);min-height:100vh;}

/* LOGIN */
#tela-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--g1),var(--g2) 60%,var(--g4));}
.login-box{background:rgba(255,255,255,.1);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:2.2rem 2rem;width:100%;max-width:340px;text-align:center;}
.login-logo{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;color:#fff;margin-bottom:.2rem;}
.login-logo em{font-style:italic;color:var(--terra);}
.login-role{display:inline-block;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-size:.75rem;font-weight:600;padding:.25rem .8rem;border-radius:50px;margin-bottom:1.2rem;letter-spacing:.05em;text-transform:uppercase;}
.login-sub{color:rgba(255,255,255,.65);font-size:.85rem;margin-bottom:1.5rem;}
.login-inp{width:100%;padding:.75rem 1rem;border-radius:50px;border:none;font-size:1.2rem;font-family:'DM Sans',sans-serif;outline:none;text-align:center;letter-spacing:.3em;margin-bottom:.8rem;}
.login-err{color:#fca5a5;font-size:.82rem;margin-bottom:.6rem;display:none;}
.btn-login{width:100%;background:var(--terra);color:#fff;border:none;border-radius:50px;padding:.85rem;font-size:1rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s;}
.btn-login:hover{opacity:.9;}
.login-links{display:flex;flex-direction:column;gap:.4rem;margin-top:.8rem;}
.link-voltar{background:none;border:none;color:rgba(255,255,255,.5);font-size:.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* APP */
#app{display:none;min-height:100vh;}
.topbar{background:var(--g1);color:#fff;padding:.85rem 1.1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.tlogo{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;}
.tlogo em{font-style:italic;color:var(--terra);}
.trole{font-size:.7rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em;margin-top:.1rem;}
.tbtn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:.4rem .9rem;border-radius:50px;cursor:pointer;font-size:.82rem;font-family:'DM Sans',sans-serif;transition:background .2s;}
.tbtn:hover{background:rgba(255,255,255,.25);}

.admin-tabs{display:flex;background:var(--g2);overflow-x:auto;scrollbar-width:none;}
.admin-tabs::-webkit-scrollbar{display:none;}
.atab{flex-shrink:0;background:none;border:none;color:rgba(255,255,255,.55);padding:.85rem .9rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;border-bottom:3px solid transparent;white-space:nowrap;}
.atab.active{color:#fff;border-bottom-color:var(--terra);}

.apanel{display:none;}
.apanel.active{display:block;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.abody{max-width:960px;margin:0 auto;padding:1.2rem;}

/* PEDIDOS */
.row-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;}
.ptitle{font-family:'Fraunces',serif;font-size:1.4rem;color:var(--g2);}
.pills{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem;}
.pill{padding:.3rem .8rem;border-radius:50px;border:1.5px solid var(--g4);background:none;font-family:'DM Sans',sans-serif;font-size:.76rem;cursor:pointer;color:var(--cinza);transition:all .2s;}
.pill.active{background:var(--g2);color:#fff;border-color:var(--g2);}
.pcard{background:var(--branco);border-radius:var(--r);padding:1.1rem 1.2rem;margin-bottom:.8rem;box-shadow:var(--sh);border-left:4px solid var(--g4);}
.pcard.s-preparando{border-left-color:#3b82f6;}
.pcard.s-saiu{border-left-color:var(--terra);}
.pcard.s-entregue{border-left-color:#9ca3af;opacity:.65;}
.ptop{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.4rem;margin-bottom:.6rem;}
.pnome{font-weight:700;font-size:.95rem;}
.pmeta{color:var(--cinza);font-size:.76rem;margin-top:.1rem;}
.sbadge{padding:.18rem .7rem;border-radius:50px;font-size:.72rem;font-weight:600;white-space:nowrap;}
.sb-recebido{background:var(--gp);color:var(--g2);}
.sb-preparando{background:var(--azul-l);color:var(--azul);}
.sb-saiu{background:var(--amarelo-l);color:var(--amarelo);}
.sb-entregue{background:#f3f4f6;color:#6b7280;}
.pitens{font-size:.83rem;color:var(--cinza);margin-bottom:.55rem;line-height:1.6;}
.pobs{font-size:.8rem;background:var(--terra-l);padding:.4rem .7rem;border-radius:8px;margin-bottom:.55rem;}
.pval{color:var(--g2);font-weight:700;font-size:.88rem;margin-bottom:.4rem;}
.pfooter{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;}
.status-sel{border:1.5px solid var(--g4);border-radius:8px;padding:.28rem .6rem;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--escuro);background:var(--branco);cursor:pointer;}
.btn-sm{border:none;border-radius:50px;padding:.32rem .85rem;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;font-weight:500;transition:all .2s;}
.btn-verde{background:var(--g2);color:#fff;}
.btn-verde:hover{background:var(--g3);}
.btn-terra{background:var(--terra);color:#fff;}
.btn-terra:hover{opacity:.85;}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--cinza);}
.empty .ic{font-size:2.8rem;margin-bottom:.7rem;}

/* NOVO PEDIDO */
.form-card{background:var(--branco);border-radius:var(--r);padding:1.3rem;box-shadow:var(--sh);margin-bottom:1.2rem;}
.form-card h3{font-family:'Fraunces',serif;color:var(--g2);font-size:1.1rem;margin-bottom:1rem;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;}
.fg{display:flex;flex-direction:column;gap:.22rem;}
.fg.s2{grid-column:span 2;}
.fg label{font-size:.76rem;font-weight:600;color:var(--cinza);}
.fg input,.fg select,.fg textarea{padding:.58rem .8rem;border:1.5px solid var(--cinza-l);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s;background:var(--branco);}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g4);}
.btn-prim{background:var(--g2);color:#fff;border:none;border-radius:50px;padding:.65rem 1.7rem;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer;margin-top:.5rem;transition:background .2s;}
.btn-prim:hover{background:var(--g3);}

/* CARRINHO INLINE */
.prod-search{width:100%;padding:.65rem 1rem;border:1.5px solid var(--cinza-l);border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;margin-bottom:.8rem;}
.prod-search:focus{border-color:var(--g4);}
.prod-mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;max-height:260px;overflow-y:auto;margin-bottom:.8rem;padding-right:.2rem;}
.pmc{background:var(--gpp);border-radius:10px;padding:.65rem .6rem;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative;}
.pmc:hover{border-color:var(--g4);}
.pmc.selecionado{border-color:var(--g2);background:var(--gp);}
.pmc-em{font-size:1.5rem;margin-bottom:.2rem;}
.pmc-n{font-size:.72rem;font-weight:600;line-height:1.2;}
.pmc-u{font-size:.64rem;color:var(--cinza);}
.pmc-badge{position:absolute;top:4px;right:4px;background:var(--terra);color:#fff;font-size:.6rem;font-weight:700;padding:.08rem .35rem;border-radius:50px;}
.itens-add{background:var(--gpp);border-radius:10px;padding:.75rem;margin-bottom:.8rem;}
.itens-add .ia-row{display:flex;align-items:center;gap:.6rem;padding:.35rem 0;border-bottom:1px solid var(--cinza-l);}
.itens-add .ia-row:last-child{border-bottom:none;}
.ia-em{font-size:1.2rem;flex-shrink:0;}
.ia-info{flex:1;font-size:.8rem;font-weight:600;}
.ia-ctrl{display:flex;align-items:center;gap:.3rem;}
.ia-btn{background:var(--gp);border:none;width:24px;height:24px;border-radius:50%;font-size:.9rem;cursor:pointer;color:var(--g2);font-weight:700;display:flex;align-items:center;justify-content:center;}
.ia-qty{font-weight:700;font-size:.8rem;min-width:32px;text-align:center;}

/* PRODUTOS */
.prod-cat-tabs{display:flex;overflow-x:auto;gap:.4rem;padding:.5rem 0 .8rem;scrollbar-width:none;margin-bottom:.5rem;}
.prod-cat-tabs::-webkit-scrollbar{display:none;}
.pctab{flex-shrink:0;padding:.35rem .9rem;border-radius:50px;border:1.5px solid var(--g4);background:none;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;color:var(--cinza);transition:all .2s;white-space:nowrap;}
.pctab.active{background:var(--g2);color:#fff;border-color:var(--g2);}
.aprod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem;margin-bottom:1.5rem;}
.apc{background:var(--branco);border-radius:var(--r);padding:.9rem;box-shadow:var(--sh);position:relative;}
.apc-img{width:100%;aspect-ratio:1/1;border-radius:8px;overflow:hidden;background:var(--gpp);display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin-bottom:.6rem;}
.apc-img img{width:100%;height:100%;object-fit:cover;}
.apc strong{display:block;font-size:.85rem;margin-bottom:.1rem;}
.apc .acat{font-size:.71rem;color:var(--cinza);}
.apc .aut{font-size:.76rem;color:var(--g3);font-weight:600;margin-top:.15rem;}
.apc-actions{display:flex;gap:.4rem;margin-top:.6rem;}
.btn-edit{flex:1;background:var(--gp);color:var(--g2);border:none;border-radius:50px;padding:.3rem 0;font-size:.74rem;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;}
.btn-desativar{flex:1;background:#fee2e2;color:var(--danger);border:none;border-radius:50px;padding:.3rem 0;font-size:.74rem;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;}
.btn-ativar{flex:1;background:#dcfce7;color:#16a34a;border:none;border-radius:50px;padding:.3rem 0;font-size:.74rem;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;}
.btn-del{background:#fee2e2;color:var(--danger);border:none;border-radius:50px;padding:.3rem .6rem;font-size:.74rem;cursor:pointer;}
.apc.inativo{opacity:.45;}
.img-prev{width:72px;height:72px;border-radius:10px;object-fit:cover;display:none;margin-top:.4rem;}

/* CENTER OVERLAY */
.center-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem;}
.center-overlay.open{display:flex;}
.cbox{background:var(--branco);border-radius:var(--r);padding:1.5rem;width:100%;max-width:340px;}
.cbox h4{font-family:'Fraunces',serif;color:var(--g2);font-size:1.15rem;margin-bottom:.6rem;}
.cbox p{font-size:.83rem;color:var(--cinza);margin-bottom:.9rem;}
.cbox input{width:100%;padding:.65rem .9rem;border:1.5px solid var(--cinza-l);border-radius:10px;font-size:1rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:.9rem;}
.cbox input:focus{border-color:var(--g4);}
.cbox-btns{display:flex;gap:.6rem;}
.btn-block{flex:1;border:none;border-radius:50px;padding:.7rem;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer;}
.btn-confirm{background:var(--g2);color:#fff;}
.btn-cancel-b{background:var(--cinza-l);color:var(--cinza);}

/* EDIT OVERLAY */
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem;}
.edit-overlay.open{display:flex;}
.edit-box{background:var(--creme);border-radius:var(--r);padding:1.5rem;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
.edit-box h4{font-family:'Fraunces',serif;color:var(--g2);font-size:1.15rem;margin-bottom:1rem;}

/* LIVE INDICATOR */
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite;margin-right:.3rem;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-badge{display:flex;align-items:center;font-size:.72rem;color:rgba(255,255,255,.7);}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--g1);color:#fff;padding:.65rem 1.3rem;border-radius:50px;font-size:.85rem;font-weight:500;z-index:999;transition:transform .3s ease;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:480px){.fgrid{grid-template-columns:1fr;}.fg.s2{grid-column:span 1;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="tela-login">
  <div class="login-box">
    <div class="login-logo">Horta <em>em</em> Casa</div>
    <span class="login-role">🚚 Equipe Delivery</span>
    <div class="login-sub">Acesso restrito para funcionários</div>
    <input class="login-inp" type="password" id="login-senha" placeholder="••••"
      onkeydown="if(event.key==='Enter')fazerLogin()">
    <div class="login-err" id="login-err">Senha incorreta. Tente novamente.</div>
    <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="login-links">
      <button class="link-voltar" onclick="window.location.href='horta_index.html'">← Voltar ao catálogo</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div>
      <div class="tlogo">Horta <em>em</em> Casa</div>
      <div class="trole">Equipe Delivery</div>
    </div>
    <div style="display:flex;align-items:center;gap:.8rem;">
      <div class="live-badge"><span class="live-dot"></span>Ao vivo</div>
      <button class="tbtn" onclick="sair()">Sair 🔓</button>
    </div>
  </div>

  <div class="admin-tabs">
    <button class="atab active" onclick="aTab('t-pedidos',this)">📋 Pedidos</button>
    <button class="atab" onclick="aTab('t-novo',this)">➕ Novo Pedido</button>
    <button class="atab" onclick="aTab('t-produtos',this)">🥦 Produtos</button>
  </div>

  <!-- PEDIDOS -->
  <div id="t-pedidos" class="apanel active">
    <div class="abody">
      <div class="row-between">
        <span class="ptitle">Pedidos do Dia</span>
      </div>
      <div class="pills" id="pills">
        <button class="pill active" onclick="filtrarPedidos('todos',this)">Todos</button>
        <button class="pill" onclick="filtrarPedidos('recebido',this)">Recebido</button>
        <button class="pill" onclick="filtrarPedidos('preparando',this)">Preparando</button>
        <button class="pill" onclick="filtrarPedidos('saiu',this)">Saiu p/ entrega</button>
        <button class="pill" onclick="filtrarPedidos('entregue',this)">Entregue</button>
      </div>
      <div id="lista-pedidos"></div>
    </div>
  </div>

  <!-- NOVO PEDIDO MANUAL -->
  <div id="t-novo" class="apanel">
    <div class="abody">
      <div class="form-card">
        <h3>➕ Registrar Pedido Manual</h3>
        <div class="fgrid">
          <div class="fg"><label>Nome do cliente *</label><input type="text" id="np-nome" placeholder="Ex: Maria Silva"></div>
          <div class="fg"><label>WhatsApp</label><input type="tel" id="np-tel" placeholder="(11) 99999-9999"></div>
          <div class="fg s2"><label>Endereço de entrega</label><input type="text" id="np-end" placeholder="Rua, número, bairro"></div>
          <div class="fg s2"><label>Observações</label><textarea id="np-obs" rows="2" placeholder="Ex: sem banana verde..."></textarea></div>
        </div>
        <div style="margin-top:1rem;">
          <label style="font-size:.78rem;font-weight:600;color:var(--cinza);display:block;margin-bottom:.5rem;">Buscar e adicionar produtos</label>
          <input class="prod-search" type="text" id="busca-prod" placeholder="🔍 Buscar produto..." oninput="filtrarProds(this.value)">
          <div class="prod-mini-grid" id="prod-mini-grid"></div>
          <div id="itens-selecionados" style="display:none;">
            <label style="font-size:.78rem;font-weight:600;color:var(--cinza);display:block;margin-bottom:.4rem;">Itens do pedido:</label>
            <div class="itens-add" id="itens-add-list"></div>
          </div>
        </div>
        <button class="btn-prim" onclick="salvarNovoPedido()">✅ Registrar Pedido</button>
      </div>
    </div>
  </div>

  <!-- PRODUTOS -->
  <div id="t-produtos" class="apanel">
    <div class="abody">
      <div class="form-card">
        <h3 id="form-titulo">➕ Novo produto</h3>
        <div class="fgrid">
          <div class="fg"><label>Nome do produto</label><input type="text" id="pn" placeholder="Ex: Tomate cereja"></div>
          <div class="fg"><label>Emoji (opcional)</label><input type="text" id="pe" placeholder="🍅"></div>
          <div class="fg">
            <label>Unidade de venda</label>
            <select id="pu">
              <option value="kg">Kg</option><option value="grama">Grama</option>
              <option value="unidade">Unidade</option><option value="maço">Maço</option>
              <option value="bandeja">Bandeja</option><option value="pacote">Pacote</option>
              <option value="frasco">Frasco</option><option value="copo">Copo</option><option value="lata">Lata</option>
            </select>
          </div>
          <div class="fg">
            <label>Categoria</label>
            <select id="pc">
              <option>Frutas, verduras e legumes</option><option>Verduras</option>
              <option>Grãos</option><option>Temperos</option><option>Chás</option>
              <option>Alimentos processados</option><option>Mercado</option>
            </select>
          </div>
          <div class="fg s2">
            <label>Foto do produto</label>
            <input type="file" id="pfoto" accept="image/*" onchange="prevFoto(this,'img-pv')">
            <img class="img-prev" id="img-pv">
          </div>
        </div>
        <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.3rem">
          <button class="btn-prim" onclick="salvarProd()">Salvar produto</button>
          <button id="btn-cancelar" onclick="cancelarEdit()" style="display:none;background:none;border:1.5px solid var(--cinza-l);border-radius:50px;padding:.65rem 1.2rem;font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;color:var(--cinza)">Cancelar</button>
        </div>
      </div>
      <div class="prod-cat-tabs" id="prod-cat-tabs"></div>
      <div id="admin-prod-list"></div>
    </div>
  </div>
</div>

<!-- modal valor -->
<div class="center-overlay" id="ov-valor">
  <div class="cbox">
    <h4>💰 Confirmar valor</h4>
    <p>Pedido de <strong id="mv-nome"></strong>. Após pesar, informe o valor e envie pelo WhatsApp.</p>
    <input type="number" id="mv-val" placeholder="Ex: 45.90" step="0.01" min="0">
    <div class="cbox-btns">
      <button class="btn-block btn-cancel-b" onclick="fecharOvValor()">Cancelar</button>
      <button class="btn-block btn-confirm" onclick="confirmarValor()">📲 Enviar</button>
    </div>
  </div>
</div>

<!-- modal editar produto -->
<div class="edit-overlay" id="ov-edit">
  <div class="edit-box">
    <h4>✏️ Editar produto</h4>
    <div class="fgrid" style="margin-bottom:.8rem">
      <div class="fg"><label>Nome</label><input type="text" id="en"></div>
      <div class="fg"><label>Emoji</label><input type="text" id="ee"></div>
      <div class="fg">
        <label>Unidade</label>
        <select id="eu">
          <option value="kg">Kg</option><option value="grama">Grama</option>
          <option value="unidade">Unidade</option><option value="maço">Maço</option>
          <option value="bandeja">Bandeja</option><option value="pacote">Pacote</option>
          <option value="frasco">Frasco</option><option value="copo">Copo</option><option value="lata">Lata</option>
        </select>
      </div>
      <div class="fg">
        <label>Categoria</label>
        <select id="ec">
          <option>Frutas, verduras e legumes</option><option>Verduras</option>
          <option>Grãos</option><option>Temperos</option><option>Chás</option>
          <option>Alimentos processados</option><option>Mercado</option>
        </select>
      </div>
      <div class="fg s2">
        <label>Nova foto (opcional)</label>
        <input type="file" id="efoto" accept="image/*" onchange="prevFoto(this,'img-ev')">
        <img class="img-prev" id="img-ev">
      </div>
    </div>
    <div class="cbox-btns">
      <button class="btn-block btn-cancel-b" onclick="fecharEdit()">Cancelar</button>
      <button class="btn-block btn-confirm" onclick="salvarEdicao()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ SENHAS ══
const SENHA_DELIVERY = '1234';

// ══ STORAGE KEYS ══
const KEY_PEDIDOS = 'hc_pedidos';
const KEY_PRODS = 'hc_prods';
const KEY_NEXT_PID = 'hc_nextPId';
const KEY_NEXT_ID = 'hc_nextId';

// ══ CATS ══
const CATS = {
  "Frutas, verduras e legumes":"🥦","Verduras":"🥬","Grãos":"🌾",
  "Temperos":"🌶️","Chás":"🍵","Alimentos processados":"🥗","Mercado":"🛍️"
};
const GRAMAS_STEPS = [100,200,300,400,500,600,700,800,900,1000,1500,2000,2500,3000,4000,5000];

function fmtGrama(g){return g>=1000?(g/1000).toFixed(g%1000===0?0:1).replace('.',',')+' kg':g+'g';}
function isKgProd(p){return p.u==='kg'||p.u==='grama';}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1).toLowerCase():'';}
function emojiAuto(n,c){
  const nm=n.toLowerCase();
  const m=[[['tomate'],'🍅'],[['alface'],'🥬'],[['banana'],'🍌'],[['cenoura'],'🥕'],[['maçã','maca'],'🍎'],[['coentro'],'🌿'],[['batata'],'🥔'],[['limão','limao'],'🍋'],[['laranja'],'🍊'],[['abacate'],'🥑'],[['abacaxi'],'🍍'],[['manga'],'🥭'],[['morango'],'🍓'],[['uva'],'🍇'],[['melancia'],'🍉'],[['cebola'],'🧅'],[['alho'],'🧄'],[['pimentão','pimentao'],'🫑'],[['pepino'],'🥒'],[['arroz'],'🍚'],[['feijão','feijao'],'🫘'],[['milho'],'🌽'],[['mel '],'🍯'],[['café'],'☕'],[['ovo'],'🥚'],[['leite'],'🥛']];
  for(const[ks,em]of m)if(ks.some(k=>nm.includes(k)))return em;
  return CATS[c]||'📦';
}

// ══ ESTADO ══
let pedidos=[], prods=[], nextPId=1, nextId=1;
let filtroPed='todos', catAdmin=Object.keys(CATS)[0], editId=null, mvId=null;
let _fotoNova=null,_fotoEdit=null;
let novoPedItens=[];
let logado=false;

// ══ STORAGE ══
function loadData(){
  try{
    const p=localStorage.getItem(KEY_PEDIDOS);
    pedidos=p?JSON.parse(p):[];
    const pr=localStorage.getItem(KEY_PRODS);
    prods=pr?JSON.parse(pr):getProdsDefault();
    nextPId=parseInt(localStorage.getItem(KEY_NEXT_PID)||'1');
    nextId=parseInt(localStorage.getItem(KEY_NEXT_ID)||(prods.length+1));
    if(!pr){salvarProds();}
  }catch(e){prods=getProdsDefault();pedidos=[];}
}
function salvarPedidos(){localStorage.setItem(KEY_PEDIDOS,JSON.stringify(pedidos));localStorage.setItem(KEY_NEXT_PID,nextPId);}
function salvarProds(){localStorage.setItem(KEY_PRODS,JSON.stringify(prods));localStorage.setItem(KEY_NEXT_ID,nextId);}

// ══ LOGIN ══
function fazerLogin(){
  const s=document.getElementById('login-senha').value;
  const err=document.getElementById('login-err');
  if(s===SENHA_DELIVERY){
    err.style.display='none';
    document.getElementById('login-senha').value='';
    document.getElementById('tela-login').style.display='none';
    document.getElementById('app').style.display='block';
    logado=true;
    loadData(); renderPedidos(); renderAdminProds(); renderProdsMini();
    // poll em tempo real
    setInterval(()=>{if(!logado)return;loadData();renderPedidos();},3000);
  }else{
    err.style.display='block';
    document.getElementById('login-senha').value='';
    document.getElementById('login-senha').focus();
  }
}
function sair(){
  logado=false;
  document.getElementById('app').style.display='none';
  document.getElementById('tela-login').style.display='flex';
}

// storage events (outras abas)
window.addEventListener('storage',e=>{
  if(!logado)return;
  if(e.key===KEY_PEDIDOS||e.key===KEY_PRODS){
    loadData(); renderPedidos(); renderAdminProds(); renderProdsMini();
    toast('🔄 Dados atualizados');
  }
});

// ══ TABS ══
function aTab(id,btn){
  document.querySelectorAll('.apanel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(id==='t-produtos')renderAdminProds();
  if(id==='t-novo'){renderProdsMini();}
}

// ══ PEDIDOS ══
function itemStr(i){const kg=isKgProd(i);return kg?`${fmtGrama(i.gramas||100)} de ${cap(i.n)}`:`${i.qty}x ${cap(i.n)}`;}
function filtrarPedidos(f,btn){
  filtroPed=f;
  document.querySelectorAll('#pills .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderPedidos();
}
function renderPedidos(){
  const f=filtroPed==='todos'?pedidos:pedidos.filter(p=>p.status===filtroPed);
  const lbl={recebido:'Recebido 🟢',preparando:'Preparando 🔵',saiu:'Saiu p/ entrega 🟡',entregue:'Entregue ✅'};
  const el=document.getElementById('lista-pedidos');
  if(!f.length){el.innerHTML=`<div class="empty"><div class="ic">📋</div>Nenhum pedido.<br><small>Pedidos aparecem aqui em tempo real.</small></div>`;return;}
  el.innerHTML=f.map(p=>`<div class="pcard s-${p.status}">
    <div class="ptop">
      <div>
        <div class="pnome">👤 ${p.nome}</div>
        ${p.endereco?`<div class="pmeta">📍 ${p.endereco}</div>`:''}
        ${p.tel?`<div class="pmeta">📱 ${p.tel}</div>`:''}
        <div class="pmeta">🕐 ${p.hora} — ${p.data}</div>
      </div>
      <span class="sbadge sb-${p.status}">${lbl[p.status]}</span>
    </div>
    <div class="pitens">${p.itens.map(i=>itemStr(i)).join(' · ')}</div>
    ${p.obs?`<div class="pobs">📝 ${p.obs}</div>`:''}
    ${p.valorConfirmado?`<div class="pval">💰 Valor: R$ ${p.valorConfirmado}</div>`:''}
    <div class="pfooter">
      <select class="status-sel" onchange="mudarStatus(${p.id},this.value)">
        <option value="recebido" ${p.status==='recebido'?'selected':''}>Recebido</option>
        <option value="preparando" ${p.status==='preparando'?'selected':''}>Preparando</option>
        <option value="saiu" ${p.status==='saiu'?'selected':''}>Saiu p/ entrega</option>
        <option value="entregue" ${p.status==='entregue'?'selected':''}>Entregue</option>
      </select>
      ${!p.valorConfirmado?`<button class="btn-sm btn-verde" onclick="abrirOvValor(${p.id})">💰 Confirmar valor</button>`:''}
      ${p.valorConfirmado&&p.status!=='entregue'?`<button class="btn-sm btn-terra" onclick="reenviarValor(${p.id})">📲 Reenviar</button>`:''}
    </div>
  </div>`).join('');
}
function mudarStatus(id,s){
  const p=pedidos.find(x=>x.id===id);
  if(p){p.status=s;salvarPedidos();renderPedidos();toast('Status atualizado');}
}
function abrirOvValor(id){
  mvId=id;
  const p=pedidos.find(x=>x.id===id);
  document.getElementById('mv-nome').textContent=p.nome;
  document.getElementById('mv-val').value='';
  document.getElementById('ov-valor').classList.add('open');
}
function fecharOvValor(){document.getElementById('ov-valor').classList.remove('open');mvId=null;}
function confirmarValor(){
  const v=parseFloat(document.getElementById('mv-val').value);
  if(!v||isNaN(v)){alert('Informe o valor.');return;}
  const p=pedidos.find(x=>x.id===mvId);
  p.valorConfirmado=v.toFixed(2).replace('.',',');
  enviarMsgValor(p);
  fecharOvValor(); salvarPedidos(); renderPedidos();
}
function reenviarValor(id){const p=pedidos.find(x=>x.id===id);enviarMsgValor(p);}
function enviarMsgValor(p){
  const msg=`🌿 *HORTA EM CASA*\n\nOlá, ${p.nome}! 😊\n\nSeu pedido foi pesado. O valor total ficou:\n\n*💰 R$ ${p.valorConfirmado}*\n\n📦 Itens:\n${p.itens.map(i=>`• ${itemStr(i)}`).join('\n')}\n\nResponda *SIM* para confirmar e aguardar a entrega, ou *NÃO* para cancelar. 🚚`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}

// ══ NOVO PEDIDO MANUAL ══
function renderProdsMini(filtro=''){
  const lista=prods.filter(p=>p.ativo&&p.n.toLowerCase().includes(filtro.toLowerCase()));
  const grid=document.getElementById('prod-mini-grid');
  grid.innerHTML=lista.map(p=>{
    const it=novoPedItens.find(x=>x.id===p.id);
    return`<div class="pmc ${it?'selecionado':''}" onclick="toggleProdMini(${p.id})">
      ${it?`<span class="pmc-badge">${isKgProd(p)?fmtGrama(it.gramas||100):it.qty+'x'}</span>`:''}
      <div class="pmc-em">${p.foto?`<img src="${p.foto}" style="width:36px;height:36px;object-fit:cover;border-radius:6px">`:p.emoji}</div>
      <div class="pmc-n">${cap(p.n)}</div>
      <div class="pmc-u">${p.u}</div>
    </div>`;
  }).join('');
  renderItensSelecionados();
}
function filtrarProds(v){renderProdsMini(v);}
function toggleProdMini(id){
  const p=prods.find(x=>x.id===id);
  const it=novoPedItens.find(x=>x.id===id);
  if(it){novoPedItens=novoPedItens.filter(x=>x.id!==id);}
  else{novoPedItens.push(isKgProd(p)?{...p,qty:1,gramas:500}:{...p,qty:1});}
  renderProdsMini(document.getElementById('busca-prod').value);
}
function ajustarItemNovo(id,d){
  const p=prods.find(x=>x.id===id);
  const it=novoPedItens.find(x=>x.id===id);
  if(!it)return;
  if(isKgProd(p)){
    const idx=GRAMAS_STEPS.indexOf(it.gramas||100);
    const ni=idx+d;
    if(ni<0){novoPedItens=novoPedItens.filter(x=>x.id!==id);}
    else if(ni<GRAMAS_STEPS.length){it.gramas=GRAMAS_STEPS[ni];}
  }else{
    it.qty+=d;
    if(it.qty<=0)novoPedItens=novoPedItens.filter(x=>x.id!==id);
  }
  renderProdsMini(document.getElementById('busca-prod').value);
}
function renderItensSelecionados(){
  const div=document.getElementById('itens-selecionados');
  const list=document.getElementById('itens-add-list');
  if(!novoPedItens.length){div.style.display='none';return;}
  div.style.display='block';
  list.innerHTML=novoPedItens.map(i=>{
    const kg=isKgProd(i);
    const lbl=kg?fmtGrama(i.gramas||100):i.qty+'x';
    return`<div class="ia-row">
      <span class="ia-em">${i.foto?`<img src="${i.foto}" style="width:28px;height:28px;object-fit:cover;border-radius:5px">`:i.emoji}</span>
      <span class="ia-info">${cap(i.n)}</span>
      <div class="ia-ctrl">
        <button class="ia-btn" onclick="ajustarItemNovo(${i.id},-1)">−</button>
        <span class="ia-qty">${lbl}</span>
        <button class="ia-btn" onclick="ajustarItemNovo(${i.id},1)">+</button>
      </div>
    </div>`;
  }).join('');
}
function salvarNovoPedido(){
  const nome=document.getElementById('np-nome').value.trim();
  if(!nome){alert('Informe o nome do cliente.');return;}
  if(!novoPedItens.length){alert('Adicione pelo menos um produto.');return;}
  const end=document.getElementById('np-end').value.trim();
  const tel=document.getElementById('np-tel').value.trim();
  const obs=document.getElementById('np-obs').value.trim();
  const pedido={
    id:nextPId++,nome,endereco:end,tel,obs,
    itens:[...novoPedItens],status:'recebido',
    hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    data:new Date().toLocaleDateString('pt-BR'),
    valorConfirmado:null,origem:'manual'
  };
  pedidos.unshift(pedido);
  salvarPedidos();
  novoPedItens=[];
  ['np-nome','np-end','np-tel','np-obs'].forEach(x=>document.getElementById(x).value='');
  renderProdsMini();
  toast('✅ Pedido registrado!');
  // vai pra aba pedidos
  document.querySelectorAll('.atab').forEach((b,i)=>{if(i===0)b.click();});
}

// ══ PRODUTOS ══
function renderAdminProds(){
  document.getElementById('prod-cat-tabs').innerHTML=Object.keys(CATS).map(c=>
    `<button class="pctab ${c===catAdmin?'active':''}" onclick="setCatAdmin('${c}')">${CATS[c]} ${c}</button>`).join('');
  const lista=prods.filter(p=>p.c===catAdmin);
  const div=document.getElementById('admin-prod-list');
  if(!lista.length){div.innerHTML=`<div class="empty"><div class="ic">📭</div>Nenhum produto nesta categoria.</div>`;return;}
  div.innerHTML=`<div class="aprod-grid">`+lista.map(p=>
    `<div class="apc${p.ativo?'':' inativo'}">
      <div class="apc-img">${p.foto?`<img src="${p.foto}" alt="${p.n}">`:p.emoji}</div>
      <strong>${cap(p.n)}</strong>
      <div class="acat">${p.c}</div>
      <div class="aut">por ${p.u}</div>
      <div class="apc-actions">
        <button class="btn-edit" onclick="editarProd(${p.id})">✏️ Editar</button>
        <button class="${p.ativo?'btn-desativar':'btn-ativar'}" onclick="toggleAtivo(${p.id})">${p.ativo?'🔴 Pausar':'🟢 Ativar'}</button>
        <button class="btn-del" onclick="delProd(${p.id})">🗑</button>
      </div></div>`).join('')+`</div>`;
}
function setCatAdmin(c){catAdmin=c;renderAdminProds();}
function salvarProd(){
  const n=document.getElementById('pn').value.trim().toUpperCase();
  const u=document.getElementById('pu').value;
  const c=document.getElementById('pc').value;
  if(!n){alert('Informe o nome.');return;}
  const e=document.getElementById('pe').value.trim()||emojiAuto(n,c);
  const fi=document.getElementById('pfoto');
  function fin(foto){
    prods.push({id:nextId++,n,u,c,emoji:e,foto:foto||null,ativo:true});
    catAdmin=c; salvarProds();
    ['pn','pe'].forEach(x=>document.getElementById(x).value='');
    fi.value=''; document.getElementById('img-pv').style.display='none'; _fotoNova=null;
    renderAdminProds(); toast('✅ Produto salvo!');
  }
  if(_fotoNova)fin(_fotoNova);
  else if(fi.files[0])resizeImg(fi.files[0],fin);
  else fin(null);
}
function toggleAtivo(id){const p=prods.find(x=>x.id===id);if(p){p.ativo=!p.ativo;salvarProds();renderAdminProds();}}
function delProd(id){if(!confirm('Remover produto?'))return;prods=prods.filter(p=>p.id!==id);salvarProds();renderAdminProds();}
function editarProd(id){
  editId=id;const p=prods.find(x=>x.id===id);
  document.getElementById('en').value=cap(p.n);
  document.getElementById('ee').value=p.emoji;
  document.getElementById('eu').value=p.u;
  document.getElementById('ec').value=p.c;
  const img=document.getElementById('img-ev');
  if(p.foto){img.src=p.foto;img.style.display='block';}else img.style.display='none';
  document.getElementById('efoto').value='';_fotoEdit=null;
  document.getElementById('ov-edit').classList.add('open');
}
function fecharEdit(){document.getElementById('ov-edit').classList.remove('open');editId=null;_fotoEdit=null;}
function salvarEdicao(){
  const p=prods.find(x=>x.id===editId);
  const n=document.getElementById('en').value.trim().toUpperCase();
  const u=document.getElementById('eu').value;
  const c=document.getElementById('ec').value;
  const e=document.getElementById('ee').value.trim()||emojiAuto(n,c);
  const ff=document.getElementById('efoto').files[0];
  function fin(foto){p.n=n;p.u=u;p.c=c;p.emoji=e;if(foto)p.foto=foto;catAdmin=c;fecharEdit();salvarProds();renderAdminProds();toast('✅ Produto editado!');}
  if(_fotoEdit)fin(_fotoEdit);
  else if(ff)resizeImg(ff,fin);
  else fin(null);
}
function cancelarEdit(){
  editId=null;_fotoNova=null;_fotoEdit=null;
  ['pn','pe'].forEach(x=>document.getElementById(x).value='');
  document.getElementById('img-pv').style.display='none';
  document.getElementById('pfoto').value='';
  document.getElementById('btn-cancelar').style.display='none';
  document.getElementById('form-titulo').textContent='➕ Novo produto';
}
function resizeImg(file,cb,maxW=800,maxH=800,q=0.85){
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW||h>maxH){const ratio=Math.min(maxW/w,maxH/h);w=Math.round(w*ratio);h=Math.round(h*ratio);}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',q));
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}
function prevFoto(input,imgId){
  const f=input.files[0];if(!f)return;
  resizeImg(f,dataUrl=>{
    const el=document.getElementById(imgId);el.src=dataUrl;el.style.display='block';
    if(imgId==='img-pv')_fotoNova=dataUrl;else _fotoEdit=dataUrl;
  });
}

// ══ TOAST ══
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ══ DADOS DEFAULT ══
function getProdsDefault(){
  function emojiAuto2(n,c){
    const nm=n.toLowerCase();
    const m=[[['tomate'],'🍅'],[['alface'],'🥬'],[['banana'],'🍌'],[['cenoura'],'🥕'],[['maçã','maca'],'🍎'],[['coentro'],'🌿'],[['batata'],'🥔'],[['limão','limao'],'🍋'],[['laranja'],'🍊'],[['abacate'],'🥑'],[['abacaxi'],'🍍'],[['manga'],'🥭'],[['morango'],'🍓'],[['uva'],'🍇'],[['melancia'],'🍉'],[['cebola'],'🧅'],[['alho'],'🧄'],[['pimentão','pimentao'],'🫑'],[['pepino'],'🥒'],[['arroz'],'🍚'],[['feijão','feijao'],'🫘'],[['milho'],'🌽'],[['ovo'],'🥚'],[['leite'],'🥛']];
    for(const[ks,em]of m)if(ks.some(k=>nm.includes(k)))return em;
    return CATS[c]||'📦';
  }
  const base=[
    ...[ ['ABACATE','kg'],['ABACAXI','unidade'],['ALFACE AMERICANA','unidade'],['ALFACE CRESPA','unidade'],
    ['BANANA MAÇÃ','kg'],['BANANA NANICA','kg'],['BANANA PRATA','kg'],['BATATA INGLESA','kg'],
    ['BETERRABA','kg'],['CENOURA','kg'],['CEBOLA','kg'],['CHUCHU','kg'],['LARANJA','kg'],
    ['LIMÃO TAHITI','kg'],['MAÇÃ FUJI','kg'],['MAÇÃ GALA','kg'],['MAMÃO FORMOSA','kg'],
    ['MANGA PALMER','kg'],['MELANCIA','unidade'],['MORANGO','bandeja'],['PEPINO COMUM','kg'],
    ['PIMENTÃO VERDE','kg'],['PIMENTÃO VERMELHO','kg'],['TOMATE CARMEM','kg'],['TOMATE CEREJA','bandeja'],
    ['TOMATE ITALIANO','kg'],['UVA ITÁLIA','bandeja'] ].map(([n,u])=>({n,u,c:'Frutas, verduras e legumes'})),
    ...[ ['ACELGA','unidade'],['AGRIÃO','unidade'],['ALECRIM','unidade'],['ALMEIRÃO','unidade'],
    ['BRÓCOLIS COMUM','unidade'],['CEBOLINHA','unidade'],['COENTRO','unidade'],['COUVE','unidade'],
    ['ESPINAFRE','unidade'],['HORTELÃ','unidade'],['RÚCULA','unidade'],['SALSA','unidade'] ].map(([n,u])=>({n,u,c:'Verduras'})),
    ...[ ['ARROZ INTEGRAL','kg'],['FEIJÃO CARIOCA','kg'],['FEIJÃO PRETO','kg'],['AVEIA EM FLOCOS','grama'],
    ['CASTANHA DE CAJU','grama'],['AMENDOIM TORRADO','grama'] ].map(([n,u])=>({n,u,c:'Grãos'})),
    ...[ ['SAL REFINADO','unidade'],['AÇÚCAR DEMERARA','grama'],['AZEITE','unidade'],['OVO CAIPIRA','bandeja'],
    ['LEITE INTEGRAL','unidade'],['QUEIJO MEIA CURA','unidade'],['MOLHO TOMATE','unidade'] ].map(([n,u])=>({n,u,c:'Mercado'})),
  ];
  return base.map((p,i)=>({...p,id:i+1,emoji:emojiAuto2(p.n,p.c),foto:null,ativo:true}));
}
</script>
